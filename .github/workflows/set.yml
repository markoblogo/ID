name: SET

on:
  workflow_dispatch:

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: markoblogo/SET@main
        with:
          agentsgen: "true"
          autodetect: "true"
          path: "."
          workflow_preset: "repo-docs"
          init: "true"
          pack: "true"
          check: "true"
          repomap: "true"
          snippets: "false"
          repomap_compact_budget: "3000"
          repomap_focus: "protocol"
          id_enabled: "true"
          id_owner_id: "markoblogo"
          id_target: "set"
          id_pre_task: "true"
          id_weekly_review: "true"
