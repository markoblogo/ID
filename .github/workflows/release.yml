name: id-protocol-release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: python -m pip install --upgrade pip build twine

      - name: Validate repo
        run: make validate

      - name: Build package artifacts
        run: make release-build

      - name: Check package metadata
        run: make release-check

      - name: Sync MCP manifest
        continue-on-error: true
        env:
          MCP_REGISTRY_ENDPOINT: ${{ vars.MCP_REGISTRY_ENDPOINT }}
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
          MCP_REGISTRY_VERSION: ${{ github.ref_name }}
          MCP_REGISTRY_PROJECT: markoblogo/ID
          MCP_REGISTRY_SOURCE: ${{ github.repository }}@${{ github.ref_name }}
        run: python scripts/publish_mcp_manifest.py --version "${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

      - name: Trigger PyPI publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pypi-publish.yml \
            --repo "${GITHUB_REPOSITORY}" \
            -f release_tag="${GITHUB_REF_NAME}"
